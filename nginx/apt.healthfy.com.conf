# ============================================================
#  AptNow (Next.js)  —  apt.healthfy.com
#  - apt.healthfy.com 요청을 로컬 3000 포트(Next.js)로 프록시한다.
#  - 같은 서버의 www.healthfy.com(WordPress, 80 포트)과는 server_name 으로 분리되어
#    서로 충돌하지 않는다. (각 도메인은 독립된 server 블록)
#
#  설치 위치 예) /etc/nginx/sites-available/apt.healthfy.com.conf
#  활성화)      sudo ln -s /etc/nginx/sites-available/apt.healthfy.com.conf \
#                          /etc/nginx/sites-enabled/
#               sudo nginx -t && sudo systemctl reload nginx
# ============================================================

# ── gzip 압축 (http 블록에 이미 있으면 생략 가능) ──
gzip on;
gzip_comp_level 5;
gzip_min_length 256;
gzip_proxied any;
gzip_vary on;
gzip_types
  text/plain text/css application/json application/javascript
  application/x-javascript text/xml application/xml application/xml+rss
  text/javascript image/svg+xml font/ttf font/otf;

# ── 1) HTTP(80): HTTPS 로 리다이렉트 ──
server {
    listen 80;
    listen [::]:80;
    server_name apt.healthfy.com;

    # certbot 갱신 챌린지 경로는 그대로 통과
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── 2) HTTPS(443): Next.js 프록시 ──
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name apt.healthfy.com;

    # ----------------------------------------------------------
    # SSL 인증서 (certbot 으로 발급)
    #   sudo certbot --nginx -d apt.healthfy.com
    #   또는 webroot 방식:
    #   sudo certbot certonly --webroot -w /var/www/certbot -d apt.healthfy.com
    # 발급 후 아래 경로가 자동 설정된다(수동 설정 시 주석 해제).
    # ----------------------------------------------------------
    ssl_certificate     /etc/letsencrypt/live/apt.healthfy.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/apt.healthfy.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    # 업로드/응답 크기 여유
    client_max_body_size 10M;

    # ── Next.js 정적 빌드 산출물: 장기 캐싱(불변) ──
    location /_next/static/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_cache_valid 200 365d;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # ── public 정적 파일 캐싱 ──
    location /static/ {
        proxy_pass http://127.0.0.1:3000;
        add_header Cache-Control "public, max-age=86400";
    }

    # ── 그 외 모든 요청: Next.js 프록시 ──
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;

        # 프록시 헤더 (원본 호스트/IP/프로토콜 전달)
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket/업그레이드 지원
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_read_timeout 60s;
    }
}

# ============================================================
#  참고) 기존 WordPress(www.healthfy.com)는 별도 server 블록에서
#  server_name www.healthfy.com; listen 80; 으로 그대로 운영된다.
#  도메인(server_name)이 다르므로 본 설정과 포트/경로 충돌이 없다.
# ============================================================
